<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat with Dad</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:       #080b10;
      --surface:  #0e1319;
      --surface2: #141a22;
      --border:   #1e2730;
      --accent:   #00e5a0;
      --accent2:  #00b8ff;
      --text:     #e8edf3;
      --muted:    #4a5568;
      --user-bg:  #0d2b1f;
      --ai-bg:    #0d1b2a;
      --danger:   #ff4d6d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, #00e5a018 0%, transparent 70%);
      top: -150px; right: -150px;
      pointer-events: none; z-index: 0;
      animation: drift 10s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from { transform: translate(0,0); }
      to   { transform: translate(-60px, 80px); }
    }

    /* ===== SETUP SCREEN ===== */
    #setup-screen {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 40px 80px #00000090, 0 0 60px #00e5a008;
      overflow: hidden;
      animation: rise 0.55s cubic-bezier(.22,.68,0,1.2) both;
    }

    .setup-top {
      padding: 30px 28px 20px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      position: relative;
      text-align: center;
    }

    .setup-top::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent) 50%, transparent);
      opacity: 0.4;
    }

    .setup-emoji { font-size: 42px; display: block; margin-bottom: 12px; }

    .setup-top h1 {
      font-family: 'Syne', sans-serif;
      font-size: 20px; font-weight: 800;
      color: var(--text);
    }

    .setup-top p {
      font-size: 12px; color: var(--muted);
      margin-top: 6px; line-height: 1.6;
    }

    .setup-body { padding: 24px 28px 28px; display: flex; flex-direction: column; gap: 16px; }

    .field label {
      display: block;
      font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      background: #090d12;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #00e5a010;
    }

    .field input::placeholder { color: #252f3a; }

    .field.api input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px #00b8ff10;
    }

    .api-hint {
      font-size: 11px; color: #1e3040; margin-top: 6px;
    }

    .api-hint a { color: #2a4a60; text-decoration: none; }
    .api-hint a:hover { color: var(--accent2); }

    #start-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none; border-radius: 12px;
      padding: 13px;
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 800;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    #start-btn:hover {
      background: #00ffb3;
      box-shadow: 0 0 24px #00e5a050;
      transform: translateY(-1px);
    }

    #start-btn:active { transform: none; }

    /* ===== CHAT SCREEN ===== */
    #chat-screen {
      display: none;
      position: relative; z-index: 1;
      width: 100%; max-width: 720px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 0 0 1px #ffffff06, 0 40px 80px #00000090, 0 0 80px #00e5a00a;
      flex-direction: column;
      overflow: hidden;
      animation: rise 0.55s cubic-bezier(.22,.68,0,1.2) both;
    }

    #chat-screen.visible { display: flex; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    /* Top bar */
    .topbar {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      position: relative;
    }

    .topbar::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent) 50%, transparent);
      opacity: 0.4;
    }

    .avatar-wrap { position: relative; }

    .avatar {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, #003d28, #001929);
      border: 1px solid #00e5a025;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .status-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 10px; height: 10px;
      background: var(--accent); border-radius: 50%;
      border: 2px solid var(--surface2);
      animation: glow 2s infinite;
    }

    @keyframes glow {
      0%,100% { box-shadow: 0 0 0 0 #00e5a060; }
      50%      { box-shadow: 0 0 0 5px transparent; }
    }

    .header-info { flex: 1; }

    .header-info h1 {
      font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700;
    }

    .header-info p { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .user-badge {
      font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--accent);
      background: #00e5a00e; border: 1px solid #00e5a022;
      padding: 5px 14px; border-radius: 30px;
    }

    /* Settings row */
    .settings-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      background: #090d12;
    }

    .settings-bar span {
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); white-space: nowrap;
    }

    .settings-bar input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--accent2);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      outline: none;
      transition: border-color 0.2s;
    }

    .settings-bar input:focus { border-color: var(--accent2); }
    .settings-bar input::placeholder { color: #252f3a; }

    #reset-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-size: 10px;
      font-family: 'DM Mono', monospace;
      cursor: pointer; padding: 7px 12px; border-radius: 8px;
      white-space: nowrap; transition: all 0.2s;
    }

    #reset-btn:hover { color: var(--danger); border-color: #ff4d6d30; }

    /* Messages */
    #messages {
      flex: 1; min-height: 300px; max-height: 420px;
      overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state { margin: auto; text-align: center; color: var(--muted); }
    .empty-icon { font-size: 38px; display: block; margin-bottom: 12px; }
    .empty-state h2 {
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      color: #1e2b36; margin-bottom: 6px;
    }
    .empty-state p { font-size: 12px; color: #182028; line-height: 1.7; }

    /* Message row */
    .msg-row {
      display: flex; gap: 12px; align-items: flex-start;
      animation: msgIn 0.3s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-icon {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }

    .msg-row.user .msg-icon { background: var(--user-bg); border: 1px solid #00e5a020; }
    .msg-row.ai  .msg-icon { background: var(--ai-bg);   border: 1px solid #00b8ff18; }

    .bubble {
      max-width: 72%; padding: 12px 16px; border-radius: 14px;
      font-size: 13.5px; line-height: 1.7;
    }

    .msg-row.user .bubble {
      background: var(--user-bg); border: 1px solid #00e5a018;
      border-top-right-radius: 3px; color: #b0f0d8;
    }

    .msg-row.ai .bubble {
      background: var(--ai-bg); border: 1px solid #00b8ff14;
      border-top-left-radius: 3px; color: #c4e8f8;
    }

    .msg-label {
      display: block; font-size: 9px; letter-spacing: 2px;
      font-weight: 700; margin-bottom: 6px; text-transform: uppercase;
    }

    .msg-row.user .msg-label { color: var(--accent); }
    .msg-row.ai  .msg-label { color: var(--accent2); }

    .bubble.error { background: #140810; border-color: #ff4d6d28; color: #ff8fa3; }
    .bubble.error .msg-label { color: var(--danger); }

    /* Typing */
    .typing-dots { display: flex; gap: 5px; padding: 2px 0; }
    .typing-dots span {
      width: 6px; height: 6px; background: var(--accent2);
      border-radius: 50%; animation: blink 1.3s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.22s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.44s; }

    @keyframes blink {
      0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
      40%          { opacity: 1; transform: scale(1.1); }
    }

    /* Input bar */
    .input-zone {
      display: flex; gap: 10px; align-items: center;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
      position: relative;
    }

    .input-zone::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent2) 50%, transparent);
      opacity: 0.25;
    }

    #user-input {
      flex: 1; background: #090d12;
      border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 16px; color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 13px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }

    #user-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #00e5a010; }
    #user-input::placeholder { color: #252f3a; }

    #send-btn {
      background: var(--accent); color: #000; border: none;
      border-radius: 12px; padding: 12px 22px;
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }

    #send-btn:hover { background: #00ffb3; box-shadow: 0 0 24px #00e5a050; transform: translateY(-1px); }
    #send-btn:active { transform: none; }
    #send-btn:disabled { background: var(--border); color: var(--muted); box-shadow: none; transform: none; cursor: not-allowed; }

    /* Footer */
    .footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 24px; border-top: 1px solid var(--border); background: #090d12;
    }

    .footer-sig { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #182028; }

    #clear-btn {
      background: none; border: 1px solid transparent;
      color: var(--muted); font-size: 11px;
      font-family: 'DM Mono', monospace;
      cursor: pointer; padding: 5px 10px; border-radius: 6px; transition: all 0.2s;
    }

    #clear-btn:hover { color: var(--danger); border-color: #ff4d6d28; }
  </style>
</head>
<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setup-screen">
  <div class="setup-top">
    <span class="setup-emoji">👨‍👦</span>
    <h1>Chat with Your Dad</h1>
    <p>Enter your details to start a conversation<br/>with your father powered by Gemini AI.</p>
  </div>
  <div class="setup-body">
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="setup-username" placeholder="e.g. Ashwani, Rahul, Sara..."/>
    </div>
    <div class="field">
      <label>Your Dad's Name</label>
      <input type="text" id="setup-dadname" placeholder="e.g. Ramesh Ji, Papa, Dad..."/>
    </div>
    <div class="field api">
      <label>Gemini API Key</label>
      <input type="password" id="setup-apikey" placeholder="Paste your Gemini API key..."/>
      <p class="api-hint">Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com ↗</a></p>
    </div>
    <button id="start-btn" onclick="startChat()">Start Chatting ➤</button>
  </div>
</div>

<!-- ===== CHAT SCREEN ===== -->
<div id="chat-screen">

  <div class="topbar">
    <div class="avatar-wrap">
      <div class="avatar" id="dad-avatar">👨</div>
      <div class="status-dot"></div>
    </div>
    <div class="header-info">
      <h1 id="dad-name-display">Your Dad</h1>
      <p>Your Father · AI Powered</p>
    </div>
    <div class="user-badge" id="user-name-display">You</div>
  </div>

  <div class="settings-bar">
    <span>API Key</span>
    <input type="password" id="api-key-input" placeholder="Your Gemini API key..."/>
    <button id="reset-btn" onclick="resetToSetup()">⟵ Reset</button>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <span class="empty-icon">💬</span>
      <h2 id="empty-title">Start the conversation!</h2>
      <p id="empty-sub">Type something below to chat with your dad.</p>
    </div>
  </div>

  <div class="input-zone">
    <input type="text" id="user-input" placeholder="Say something to your dad..."/>
    <button id="send-btn" onclick="sendMessage()">Send ➤</button>
  </div>

  <div class="footer">
    <span class="footer-sig" id="footer-sig">Dad Chat · Gemini AI</span>
    <button id="clear-btn" onclick="clearChat()">⌫ Clear</button>
  </div>

</div>

<script>
  // ===== State =====
  let userName = "";
  let dadName  = "";
  let chatHistory = [];

  // ===== START: move from setup to chat =====
  function startChat() {
    const uName  = document.getElementById("setup-username").value.trim();
    const dName  = document.getElementById("setup-dadname").value.trim();
    const apiKey = document.getElementById("setup-apikey").value.trim();

    if (!uName)  { alert("Please enter your name!"); return; }
    if (!dName)  { alert("Please enter your dad's name!"); return; }
    if (!apiKey) { alert("Please enter your Gemini API key!"); return; }

    userName = uName;
    dadName  = dName;

    // Save to localStorage so user doesn't re-enter every time
    localStorage.setItem("dad-chat-config", JSON.stringify({ userName, dadName, apiKey }));

    applyConfig(userName, dadName, apiKey);
    showChatScreen();
  }

  // ===== Apply names to the UI =====
  function applyConfig(uName, dName, apiKey) {
    document.getElementById("dad-name-display").textContent = dName;
    document.getElementById("user-name-display").textContent = uName;
    document.getElementById("footer-sig").textContent = uName + "'s Dad Chat · Gemini AI";
    document.getElementById("empty-title").textContent = "Say something to " + dName + "!";
    document.getElementById("empty-sub").textContent = "Type below to start talking to your dad.";
    document.getElementById("api-key-input").value = apiKey;
    document.getElementById("user-input").placeholder = "Say something to " + dName + "...";

    // First letter of dad's name as avatar
    const first = dName.charAt(0).toUpperCase();
    document.getElementById("dad-avatar").textContent = "👨";
    document.title = uName + " × " + dName;
  }

  // ===== Show/hide screens =====
  function showChatScreen() {
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("chat-screen").classList.add("visible");
    loadChatHistory();
  }

  function resetToSetup() {
    if (confirm("Go back to setup? Chat history will be kept.")) {
      document.getElementById("chat-screen").classList.remove("visible");
      document.getElementById("setup-screen").style.display = "";
    }
  }

  // ===== BUILD the character prompt dynamically =====
  function buildPrompt(userText) {
    return (
      "You are " + dadName + ", a father talking to your child " + userName + ". " +
      "You are warm but firm. You care deeply about your child's growth, education, and future. " +
      "You speak naturally as a real dad would — sometimes serious, sometimes caring. " +
      "You can mix Hindi and English (Hinglish) if it feels natural. " +
      "Address your child as '" + userName + "' or 'beta' sometimes. " +
      "Do NOT include any intro or preamble — reply directly as the character. " +
      userName + " says: " + userText
    );
  }

  // ===== SEND MESSAGE =====
  async function sendMessage() {
    const input  = document.getElementById("user-input");
    const apiKey = document.getElementById("api-key-input").value.trim();
    const text   = input.value.trim();

    if (!text)   { alert("Kuch toh likho!"); return; }
    if (!apiKey) { alert("API key missing!"); return; }

    input.value = "";
    chatHistory.push({ role: "user", text });
    renderMessages();
    showTyping();

    const btn = document.getElementById("send-btn");
    btn.disabled = true;

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: buildPrompt(text) }] }]
          })
        }
      );

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err?.error?.message || "API error");
      }

      const data  = await res.json();
      const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No reply received.";

      removeTyping();
      chatHistory.push({ role: "ai", text: reply });

    } catch (err) {
      removeTyping();
      chatHistory.push({ role: "error", text: "⚠ " + err.message });
    }

    renderMessages();
    btn.disabled = false;
    saveChatHistory();
    scrollBottom();
  }

  // ===== RENDER =====
  function renderMessages() {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    if (chatHistory.length === 0) {
      const e = document.createElement("div");
      e.className = "empty-state";
      e.innerHTML = `
        <span class="empty-icon">💬</span>
        <h2>Say something to ${dadName}!</h2>
        <p>Type below to start talking to your dad.</p>`;
      box.appendChild(e);
      return;
    }

    chatHistory.forEach(msg => {
      const row = document.createElement("div");
      row.className = "msg-row " + (msg.role === "user" ? "user" : "ai");

      const icon = document.createElement("div");
      icon.className = "msg-icon";
      icon.textContent = msg.role === "user" ? "🧑" : "👨";

      const bubble = document.createElement("div");
      bubble.className = "bubble" + (msg.role === "error" ? " error" : "");

      const label = document.createElement("span");
      label.className = "msg-label";
      label.textContent =
        msg.role === "user"  ? userName :
        msg.role === "error" ? "Error"  : dadName;

      bubble.appendChild(label);
      bubble.appendChild(document.createTextNode(msg.text));

      row.appendChild(icon);
      row.appendChild(bubble);
      box.appendChild(row);
    });

    scrollBottom();
  }

  // ===== TYPING =====
  function showTyping() {
    const box = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = "msg-row ai"; row.id = "typing-row";

    const icon = document.createElement("div");
    icon.className = "msg-icon"; icon.textContent = "👨";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `<span class="msg-label">${dadName}</span><div class="typing-dots"><span></span><span></span><span></span></div>`;

    row.appendChild(icon); row.appendChild(bubble);
    box.appendChild(row);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById("typing-row");
    if (el) el.remove();
  }

  function scrollBottom() {
    const box = document.getElementById("messages");
    box.scrollTop = box.scrollHeight;
  }

  // ===== STORAGE =====
  function saveChatHistory() {
    localStorage.setItem("dad-chat-history", JSON.stringify(chatHistory.slice(-20)));
  }

  function loadChatHistory() {
    const saved = localStorage.getItem("dad-chat-history");
    if (saved) chatHistory = JSON.parse(saved);
    renderMessages();
  }

  function clearChat() {
    if (confirm("Clear all messages?")) {
      chatHistory = [];
      localStorage.removeItem("dad-chat-history");
      renderMessages();
    }
  }

  // ===== ENTER KEY =====
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("user-input").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // Also allow Enter on setup fields
    ["setup-username","setup-dadname","setup-apikey"].forEach(id => {
      document.getElementById(id).addEventListener("keydown", e => {
        if (e.key === "Enter") startChat();
      });
    });
  });

  // ===== AUTO-LOGIN if config saved =====
  (function autoLoad() {
    const saved = localStorage.getItem("dad-chat-config");
    if (saved) {
      try {
        const { userName: u, dadName: d, apiKey } = JSON.parse(saved);
        if (u && d && apiKey) {
          userName = u; dadName = d;
          document.getElementById("setup-username").value = u;
          document.getElementById("setup-dadname").value  = d;
          document.getElementById("setup-apikey").value   = apiKey;
          applyConfig(u, d, apiKey);
          showChatScreen();
        }
      } catch(e) {}
    }
  })();
</script>
</body>
</html>
